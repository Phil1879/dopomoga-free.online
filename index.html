<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title> </title>
<meta name="theme-color" content="#eaf6fc">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    background:linear-gradient(160deg,#eaf6fc 0%,#dceefa 100%);-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;min-height:100vh;padding:22px 18px 34px;
    display:flex;flex-direction:column;justify-content:center;gap:22px}
  .head{text-align:center}
  .head img{display:block;width:100%;max-width:440px;height:auto;margin:0 auto}
  .head .sub{font-size:20px;font-weight:600;color:#164e9e;margin-top:8px}
  .car{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(14,127,184,.22);background:#000;aspect-ratio:4/3}
  .slides{display:flex;transition:transform .5s ease;height:100%}
  .slides img{min-width:100%;width:100%;height:100%;object-fit:cover;display:block}
  .dots{position:absolute;left:0;right:0;bottom:10px;display:flex;gap:7px;justify-content:center}
  .dots b{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.55);transition:.3s;cursor:pointer}
  .dots b.on{background:#fff;width:22px;border-radius:5px}
  .arw{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;border:0;border-radius:50%;
    background:rgba(0,0,0,.35);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .arw:active{background:rgba(0,0,0,.6)}
  .arw.l{left:8px}.arw.r{right:8px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .chips span{background:#fff;border:1px solid #cfe6f4;color:#0a5f8c;font-size:12.5px;font-weight:600;
    padding:6px 11px;border-radius:20px;box-shadow:0 2px 6px rgba(14,127,184,.08)}
  .cta{display:flex;flex-direction:column;gap:12px}
  .btn{display:flex;align-items:center;justify-content:center;gap:9px;text-decoration:none;font-size:17px;font-weight:700;
    padding:16px;border-radius:14px;transition:transform .1s}
  .btn:active{transform:scale(.98)}
  .btn.call{background:linear-gradient(135deg,#20b859,#0f9d43);color:#fff;box-shadow:0 8px 20px rgba(16,157,67,.35)}
  .btn.site{background:#fff;color:#0a5f8c;border:2px solid #0e7fb8}
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-17388511580"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'AW-17388511580');
</script>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <img src="title.jpg" alt="Реабілітація наркозалежних">
      <div class="sub">Безкоштовна консультація</div>
    </div>
    <div class="car" id="car">
      <div class="slides" id="slides">
        <img src="foto1.jpg" alt="">
        <img src="foto2.jpg" alt="">
        <img src="foto3.jpg" alt="">
        <img src="foto4.jpg" alt="">
      </div>
      <button class="arw l" onclick="go(-1)" aria-label="‹">‹</button>
      <button class="arw r" onclick="go(1)" aria-label="›">›</button>
      <div class="dots" id="dots"></div>
    </div>

    <div class="cta">
      <a class="btn call" href="tel:+380937668373">📞 Зателефонувати</a>
      <a class="btn site" href="https://djerelo.help/">Перейти на сайт</a>
    </div>
  </div>

<script>
  var n=4,i=0,slides=document.getElementById('slides'),dots=document.getElementById('dots'),t;
  for(var k=0;k<n;k++){var b=document.createElement('b');b.onclick=(function(x){return function(){set(x)}})(k);dots.appendChild(b)}
  function render(){slides.style.transform='translateX(-'+(i*100)+'%)';
    var d=dots.children;for(var k=0;k<n;k++)d[k].className=k===i?'on':''}
  function set(x){i=(x+n)%n;render();reset()}
  function go(d){set(i+d)}
  function reset(){clearInterval(t);t=setInterval(function(){go(1)},5400)}
  render();reset();
  var x0=null;
  slides.parentElement.addEventListener('touchstart',function(e){x0=e.touches[0].clientX},{passive:true});
  slides.parentElement.addEventListener('touchend',function(e){if(x0===null)return;
    var dx=e.changedTouches[0].clientX-x0;if(Math.abs(dx)>40)go(dx<0?1:-1);x0=null});
</script>
</body>
</html>
